<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>로또 번호 생성기</h1>
    <div id="lotto-container" class="ball-container">
      <!-- 번호가 여기에 생성됩니다 -->
    </div>
    <button id="generate-btn">번호 생성하기</button>
  </div>

  <div class="container counseling-container">
    <h1>학생 상담 신청</h1>
    <form action="https://formspree.io/f/xojyzlov" method="POST">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
      </div>
      
      <div class="form-group">
        <label for="student-id">학번</label>
        <input type="text" id="student-id" name="student-id" required placeholder="학번을 입력하세요">
      </div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="_replyto" required placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label for="category">상담 분야</label>
        <select id="category" name="category" required>
          <option value="">분야를 선택하세요</option>
          <option value="academic">학업/성적</option>
          <option value="career">진로/취업</option>
          <option value="personal">개인/심리</option>
          <option value="other">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">상담 내용</label>
        <textarea id="message" name="message" rows="4" required placeholder="상담하고 싶은 내용을 간단히 적어주세요"></textarea>
      </div>

      <button type="submit">상담 신청하기</button>
    </form>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
